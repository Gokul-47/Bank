<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly Bank</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        :root {
            --primary-color: #FF6B35;
            --secondary-color: #F7931E;
            --gradient: linear-gradient(135deg, #FF6B35 0%, #F7931E 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .error-container {
            text-align: center;
            color: white;
            max-width: 600px;
        }

        .error-code {
            font-size: 180px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 5px 5px 10px rgba(0,0,0,0.3);
            animation: bounce 2s infinite;
        }

        .error-title {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .error-message {
            font-size: 20px;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .error-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-error {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-back {
            background: white;
            color: var(--primary-color);
        }

        .btn-home {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
        }

        .btn-error:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .floating-icons {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .floating-icon {
            position: absolute;
            font-size: 40px;
            opacity: 0.1;
            animation: float 10s infinite ease-in-out;
        }

        .floating-icon:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-icon:nth-child(2) {
            top: 20%;
            right: 15%;
            animation-delay: 2s;
        }

        .floating-icon:nth-child(3) {
            bottom: 15%;
            left: 20%;
            animation-delay: 4s;
        }

        .floating-icon:nth-child(4) {
            bottom: 20%;
            right: 10%;
            animation-delay: 6s;
        }

        .floating-icon:nth-child(5) {
            top: 50%;
            left: 5%;
            animation-delay: 8s;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-30px) rotate(180deg);
            }
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 120px;
            }

            .error-title {
                font-size: 32px;
            }

            .error-message {
                font-size: 16px;
            }

            .error-buttons {
                flex-direction: column;
            }

            .btn-error {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 576px) {
            .error-code {
                font-size: 80px;
            }

            .error-title {
                font-size: 24px;
            }

            .error-message {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="floating-icons">
        <i class="fas fa-university floating-icon"></i>
        <i class="fas fa-credit-card floating-icon"></i>
        <i class="fas fa-coins floating-icon"></i>
        <i class="fas fa-chart-line floating-icon"></i>
        <i class="fas fa-wallet floating-icon"></i>
    </div>

    <div class="error-container animate__animated animate__fadeIn">
        <div class="error-code animate__animated animate__bounceIn">404</div>
        <h1 class="error-title animate__animated animate__fadeInUp">Oops! Page Not Found</h1>
        <p class="error-message animate__animated animate__fadeInUp">
            The page you're looking for doesn't exist or has been moved. Don't worry, let's get you back on track!
        </p>
        <div class="error-buttons animate__animated animate__fadeInUp">
            <button onclick="goBack()" class="btn-error btn-back">
                <i class="fas fa-arrow-left"></i> Go Back
            </button>
            <a href="index.html" class="btn-error btn-home">
                <i class="fas fa-home"></i> Home Page
            </a>
        </div>
    </div>

    <script>
        function goBack() {
            // Try to get the previous page from sessionStorage
            const previousPage = sessionStorage.getItem('previousPage');
            
            if (previousPage && previousPage !== window.location.href) {
                window.location.href = previousPage;
            } else if (document.referrer && !document.referrer.includes('404.html')) {
                window.history.back();
            } else {
                // If no referrer, go to home
                window.location.href = 'index.html';
            }
        }

        // Add some fun interaction
        document.querySelector('.error-code').addEventListener('click', function() {
            this.classList.add('animate__animated', 'animate__tada');
            setTimeout(() => {
                this.classList.remove('animate__animated', 'animate__tada');
            }, 1000);
        });
    </script>
</body>
</html>
